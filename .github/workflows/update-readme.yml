name: Auto-Update Lab Progress

on:
  push:
    branches:
      - main # Change this to 'master' if that is your default branch
    paths:
      - 'README.md' # Only runs when you modify the README

permissions:
  contents: write # Grants the bot permission to push the updated file

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Auto-Updater
        run: python scripts/update_progress.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update progress metrics"
          git push
